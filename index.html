<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forum Matematika 37</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9805/9805578.png" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #f1f5f9; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
    .container { width: 100%; height: 100vh; height: -webkit-fill-available; display: flex; flex-direction: column; }
    .iframe-container { flex: 1; width: 100%; height: 100%; position: relative; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; background: #f1f5f9; }
    .loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; color: white; z-index: 10; }
    .spinner { border: 4px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 4px solid white; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Memuat aplikasi...</p>
    </div>
    <div class="iframe-container">
      <iframe id="appFrame" src="" allow="fullscreen; camera; microphone" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"></iframe>
    </div>
  </div>

    <script>
    // URL Google Apps Script Anda
    const APP_URL = "https://script.google.com/macros/s/AKfycbwqc6NA_CguRP8qcP0SGYiTD5zDiSufZA9lMh01x9oj257k7jTACm57JyWedkxFKJIi/exec";
    
    const appFrame = document.getElementById('appFrame');
    const loading = document.getElementById('loading');
    
    function loadApp() {
      loading.style.display = 'block';
      
      // =============================================================
      // LOGIKA DEBUG & PEMBACA ID
      // =============================================================
      const fullUrl = window.location.href; // Baca URL penuh
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      
      // LOG PENTING: Lihat Console (F12) untuk melihat hasil ini
      console.log("=== DEBUG GITHUB ===");
      console.log("Full URL yg dibuka:", fullUrl);
      console.log("ID terbaca:", id);
      console.log("====================");

      let targetUrl = APP_URL;
      
      if (id) {
        // Jika ada ID, tambahkan ke URL Google Script
        // Logika Aman: cek apakah URL sudah punya '?' atau belum
        if (targetUrl.indexOf('?') !== -1) {
             targetUrl += "&id=" + id;
        } else {
             targetUrl += "?id=" + id;
        }
        console.log("Meneruskan ID ke Iframe:", id);
      } else {
        console.log("TIDAK ADA ID. Mode Normal.");
      }
      
      appFrame.src = targetUrl;
    }
    
    appFrame.addEventListener('load', function() {
      loading.style.display = 'none';
    });
    
    window.addEventListener('DOMContentLoaded', loadApp);
  </script>
 
</body>
</html>
