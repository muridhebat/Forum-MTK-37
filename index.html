<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forum Matematika 37</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/9805/9805578.png" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    html, body { 
      width: 100%; 
      height: 100%; 
      background: #f1f5f9; 
      font-family: 'Segoe UI', sans-serif; 
      overflow: hidden; 
    }
    
    .container { 
      width: 100%; 
      height: 100vh; 
      height: -webkit-fill-available; 
      display: flex; 
      flex-direction: column; 
    }
    
    .iframe-container { 
      flex: 1; 
      width: 100%; 
      height: 100%; 
      position: relative; 
      overflow: hidden; 
    }
    
    iframe { 
      width: 100%; 
      height: 100%; 
      border: none; 
      background: #f1f5f9; 
    }
    
    /* ========================================
       LOADING SCREEN - KUBUS 3D MATEMATIKA
       ======================================== */
    .loading { 
      position: fixed; 
      top: 0; 
      left: 0;
      width: 100%; 
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 50%, #dbeafe 100%);
      z-index: 10; 
      transition: opacity 0.5s ease;
    }

    .loading.hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* Ukuran Kontainer Kubus */
    .cube-container {
      width: 60px;
      height: 60px;
      perspective: 200px;
      margin-bottom: 30px;
    }

    /* Kubus 3D */
    .cube {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      animation: rotateCube 4s infinite linear;
    }

    /* Sisi-sisi Kubus (Warna Rubik) */
    .face {
      position: absolute;
      width: 60px;
      height: 60px;
      border: 2px solid rgba(255, 255, 255, 0.8);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 24px;
      color: rgba(0,0,0,0.3);
      box-shadow: inset 0 0 15px rgba(255,255,255,0.5);
    }

    /* Warna Sisi (Nuansa Pelangi/ Rubik) */
    .front  { background: rgba(239, 68, 68, 0.9); transform: rotateY(0deg) translateZ(30px); }    /* Merah */
    .back   { background: rgba(249, 115, 22, 0.9); transform: rotateY(180deg) translateZ(30px); } /* Oranye */
    .right  { background: rgba(34, 197, 94, 0.9); transform: rotateY(90deg) translateZ(30px); }   /* Hijau */
    .left   { background: rgba(59, 130, 246, 0.9); transform: rotateY(-90deg) translateZ(30px); } /* Biru */
    .top    { background: rgba(255, 255, 255, 0.95); transform: rotateX(90deg) translateZ(30px); }/* Putih */
    .bottom { background: rgba(234, 179, 8, 0.9); transform: rotateX(-90deg) translateZ(30px); }  /* Kuning */

    /* Animasi Berputar 360 Derajat dari Berbagai Arah */
    @keyframes rotateCube {
      0%   { transform: rotateX(0deg) rotateY(0deg); }
      25%  { transform: rotateX(90deg) rotateY(90deg); }
      50%  { transform: rotateX(180deg) rotateY(180deg); }
      75%  { transform: rotateX(270deg) rotateY(270deg); }
      100% { transform: rotateX(360deg) rotateY(360deg); }
    }

    /* Teks Memuat Aplikasi */
    .loading-text {
      font-size: 1.1rem;
      font-weight: 600;
      color: #334155; /* Warna Slate gelap, bukan putih */
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Efek "Breathing" untuk teks */
    .loading-text::after {
      content: '';
      animation: dots 2s infinite;
    }

    @keyframes dots {
      0%, 20% { content: ''; }
      40% { content: '.'; }
      60% { content: '..'; }
      80%, 100% { content: '...'; }
    }

  </style>
</head>
<body>
  <div class="container">
    
    <!-- Loading Screen Baru -->
    <div class="loading" id="loading">
      <div class="cube-container">
        <div class="cube">
          <!-- 6 Sisi Kubus -->
          <div class="face front">∑</div>
          <div class="face back">π</div>
          <div class="face right">∫</div>
          <div class="face left">∞</div>
          <div class="face top">÷</div>
          <div class="face bottom">√</div>
        </div>
      </div>
      <p class="loading-text">Memuat Aplikasi</p>
    </div>

    <div class="iframe-container">
      <iframe id="appFrame" src="" allow="fullscreen; camera; microphone" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"></iframe>
    </div>
  </div>

  <script>
    // URL Google Apps Script Anda
    const APP_URL = "https://script.google.com/macros/s/AKfycbwqc6NA_CguRP8qcP0SGYiTD5zDiSufZA9lMh01x9oj257k7jTACm57JyWedkxFKJIi/exec";
    
    const appFrame = document.getElementById('appFrame');
    const loading = document.getElementById('loading');
    
    function loadApp() {
      // Tampilkan loading
      loading.classList.remove('hidden');
      
      const fullUrl = window.location.href;
      const params = new URLSearchParams(window.location.search);
      const id = params.get('id');
      
      console.log("=== DEBUG GITHUB ===");
      console.log("Full URL yg dibuka:", fullUrl);
      console.log("ID terbaca:", id);
      console.log("====================");

      let targetUrl = APP_URL;
      
      if (id) {
        if (targetUrl.indexOf('?') !== -1) {
             targetUrl += "&id=" + id;
        } else {
             targetUrl += "?id=" + id;
        }
        console.log("Meneruskan ID ke Iframe:", id);
      } else {
        console.log("TIDAK ADA ID. Mode Normal.");
      }
      
      appFrame.src = targetUrl;
    }
    
    appFrame.addEventListener('load', function() {
      // Sembunyikan loading dengan transisi halus
      loading.classList.add('hidden');
    });
    
    window.addEventListener('DOMContentLoaded', loadApp);
  </script>
</body>
</html>
